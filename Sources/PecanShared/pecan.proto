syntax = "proto3";

package pecan;

// ==========================================
// UI -> Server Communication
// ==========================================
service ClientService {
    // Bidirectional stream for the UI client to talk to the Server
    rpc StreamEvents(stream ClientMessage) returns (stream ServerMessage);
}

message ClientMessage {
    oneof payload {
        StartTaskRequest start_task = 1;
        TaskInput user_input = 2;
        ToolApproval tool_approval = 3;
    }
}

message StartTaskRequest {
    string initial_prompt = 1;
    string fork_session_id = 2;  // if set, copy context+shares from this session
    string project_name = 3;     // optional: assign agent to this project
    string team_name = 4;        // optional: assign agent to this team within the project
}

message TaskInput {
    string session_id = 1;
    string text = 2;
}

message ToolApproval {
    string session_id = 1;
    string tool_call_id = 2;
    bool approved = 3;
    string reject_reason = 4;
}

message ServerMessage {
    oneof payload {
        SessionStarted session_started = 1;
        AgentOutput agent_output = 2;
        ToolApprovalRequest approval_request = 3;
        TaskCompleted task_completed = 4;
        TaskUpdate task_update = 5;
        SessionUpdate session_update = 6;
    }
}

message SessionStarted {
    string session_id = 1;
    string agent_name = 2;
    string project_name = 3;
    string team_name = 4;
}

message AgentOutput {
    string session_id = 1;
    string text = 2;
}

message ToolApprovalRequest {
    string session_id = 1;
    string tool_call_id = 2;
    string tool_name = 3;
    string arguments_json = 4;
}

message TaskCompleted {
    string session_id = 1;
}

// ==========================================
// Agent -> Server Communication
// ==========================================
service AgentService {
    // Bidirectional stream for the isolated Agent to talk to the Server
    rpc Connect(stream AgentEvent) returns (stream HostCommand);
}

message AgentEvent {
    oneof payload {
        AgentRegistration register = 1;
        LLMCompletionRequest completion_request = 2;
        ToolExecutionRequest tool_request = 3;
        TaskProgress progress = 4;
        GetModelsRequest get_models = 5;
        ContextCommand context_command = 6;
        TaskCommand task_command = 7;
        HttpProxyRequest http_request = 8;
        ExecResponse exec_response = 9;
        MemoryCommand memory_command = 10;
        SkillsCommand skills_command = 11;
        ChangesetResponse changeset_response = 12;
        MergeResolutionResponse merge_resolution = 13;
    }
}

message ExecResponse {
    string request_id = 1;
    string output = 2;
    int32 exit_code = 3;
}

message MemoryCommand {
    string request_id = 1;
    string action = 2;      // "list_tags", "read_tag", "write_tag", "append_tag", "unlink_tag", "rename_tag"
    string scope = 3;       // "agent", "project", "team"
    string tag = 4;
    string content = 5;
    string new_tag = 6;     // used by rename_tag
}

message MemoryResponse {
    string request_id = 1;
    string content = 2;     // JSON array for list_tags; rendered markdown for read_tag
    string error_message = 3;
}

message SkillsCommand {
    string request_id = 1;
    string action = 2;      // "list_dir", "read_file"
    string path = 3;
}

message SkillsResponse {
    string request_id = 1;
    string content = 2;     // JSON array for list_dir; file content for read_file
    bool is_executable = 3;
    string error_message = 4;
}

message ChangesetCommand {
    string request_id = 1;
    string action = 2;          // "list", "diff", "read_file", "discard"
    string path = 3;            // used by read_file to specify which file
    repeated string patterns = 4; // optional glob filters for list/diff/discard (e.g. "*.swift", "src/**")
}

message ChangesetResponse {
    string request_id = 1;
    string content = 2;     // JSON array of {path,type} for "list"; unified diff text for "diff"
    bytes file_data = 3;    // raw file bytes for "read_file"
    string error_message = 4;
}

// Sent from server to agent when a merge has conflicts the agent must resolve.
message MergeConflictCommand {
    string merge_id = 1;
    int32 attempt = 2;
    repeated MergeConflict conflicts = 3;
}

message MergeConflict {
    string path = 1;
    string base_content = 2;    // project file as of the agent's base commit (empty if new file)
    string current_content = 3; // current project file (what someone else may have changed)
    string agent_content = 4;   // what the agent wrote (upper dir)
    string conflict_text = 5;   // pre-merged text with <<<< ==== >>>> markers
}

// Sent from agent back to server with resolved file contents.
message MergeResolutionResponse {
    string merge_id = 1;
    repeated MergeResolvedFile resolved = 2;
    bool abort = 3;             // true if agent declares the conflicts unresolvable
    string message = 4;         // explanation from agent
}

message MergeResolvedFile {
    string path = 1;
    bytes content = 2;
}

message AgentRegistration {
    string agent_id = 1;
    string session_id = 2;
}

message GetModelsRequest {
    string request_id = 1;
}

enum ContextSection {
    SYSTEM = 0;
    CONVERSATION = 1;
    TOOLS = 2;
}

message ContextCommand {
    string request_id = 1;
    oneof action {
        AddContextMessage add_message = 2;
        GetContextInfo get_info = 3;
        CompactContext compact = 4;
    }
}

message AddContextMessage {
    ContextSection section = 1;
    string role = 2;
    string content = 3;
    string metadata_json = 4; // tool calls, etc.
}

message GetContextInfo {
    // Empty for now, just asks for sizes
}

message CompactContext {
    ContextSection section = 1;
    int32 keep_recent_messages = 2;
}

message LLMCompletionRequest {
    string request_id = 1;
    string model_key = 2; // e.g., 'qwen3' or 'mock'
    string params_json = 3; // optional overrides like temperature
}

message ToolExecutionRequest {
    string request_id = 1;
    string tool_name = 2;
    string arguments_json = 3;
}

message TaskProgress {
    string status_message = 1;
}

message HostCommand {
    oneof payload {
        RegistrationResponse registration_response = 1;
        LLMCompletionResponse completion_response = 2;
        ToolExecutionResponse tool_response = 3;
        ShutdownCommand shutdown = 4;
        ProcessInput process_input = 5;
        GetModelsResponse models_response = 6;
        ContextResponse context_response = 7;
        TaskResponse task_response = 8;
        HttpProxyResponse http_response = 9;
        ExecCommand exec_command = 10;
        MemoryResponse memory_response = 11;
        SkillsResponse skills_response = 12;
        ChangesetCommand changeset_command = 13;
        MergeConflictCommand merge_conflict_command = 14;
    }
}

message ExecCommand {
    string request_id = 1;
    string command = 2;
}

message GetModelsResponse {
    string request_id = 1;
    message ModelInfo {
        string key = 1;
        string name = 2;
        string description = 3;
    }
    repeated ModelInfo models = 2;
}

message ContextResponse {
    string request_id = 1;
    string info_json = 2;
    string error_message = 3;
}

message RegistrationResponse {
    bool success = 1;
    string project_name = 2;
    string team_name = 3;
    string project_directory = 4;   // host directory the project is associated with
    string project_mount = 5;       // guest mount path for project directory
    string team_mount = 6;          // guest mount path for team workspace
}

message LLMCompletionResponse {
    string request_id = 1;
    string response_json = 2;
    string error_message = 3;
}

message ToolExecutionResponse {
    string request_id = 1;
    string result_json = 2;
    string error_message = 3;
}

message ShutdownCommand {
    string reason = 1;
}

message ProcessInput {
    string text = 1;
}

message TaskCommand {
    string request_id = 1;
    string action = 2;        // "create", "list", "get", "update", "focus",
                               // "project_create", "project_list", "project_get",
                               // "team_create", "team_list", "team_get"
    string payload_json = 3;
    string scope = 4;         // "agent" (default), "team", "project"
}

message TaskResponse {
    string request_id = 1;
    string result_json = 2;
    string error_message = 3;
}

message TaskUpdate {
    string session_id = 1;
    string focused_task_title = 2;
}

message SessionUpdate {
    string session_id = 1;
    string project_name = 2;
    string team_name = 3;
    string merge_status = 4;  // "merging", "merged", "failed", or "" for normal
}

// ==========================================
// HTTP Proxy (Agent <-> Server)
// ==========================================

message HttpProxyRequest {
    string request_id = 1;
    string method = 2;              // GET, POST, PUT, PATCH, DELETE
    string url = 3;
    repeated HttpHeader headers = 4;
    repeated HttpQueryParam query_params = 5;
    string body = 6;
    bool requires_approval = 7;
}

message HttpHeader {
    string name = 1;
    string value = 2;
}

message HttpQueryParam {
    string name = 1;
    string value = 2;
}

message HttpProxyResponse {
    string request_id = 1;
    int32 status_code = 2;
    repeated HttpHeader response_headers = 3;
    string body = 4;
    string error_message = 5;
}

// ==========================================
// VM Launcher IPC (Server <-> VM Launcher)
// ==========================================

message LauncherMountSpec {
    string source = 1;
    string destination = 2;
    bool read_only = 3;
}

message LauncherRequest {
    oneof payload {
        LauncherSpawnRequest spawn = 1;
        LauncherTerminateRequest terminate = 2;
        LauncherExecRequest exec = 3;
    }
}

message LauncherSpawnRequest {
    string session_id = 1;
    string grpc_socket_path = 2;
    string agent_name = 3;
    repeated LauncherMountSpec mounts = 4;
}

message LauncherTerminateRequest {
    string session_id = 1;
}

message LauncherExecRequest {
    string session_id = 1;
    repeated string command = 2;
}

message LauncherResponse {
    string session_id = 1;
    bool success = 2;
    string error_message = 3;
}

// ==========================================
// MLX Server IPC (Server <-> MLX Server)
// ==========================================

message MLXRequest {
    oneof payload {
        MLXLoadModelRequest load_model = 1;
        MLXUnloadModelRequest unload_model = 2;
        MLXGenerateRequest generate = 3;
        MLXListModelsRequest list_models = 4;
    }
}

message MLXLoadModelRequest {
    string request_id = 1;
    string huggingface_repo = 2;    // e.g. "mlx-community/Qwen2.5-Coder-7B-4bit"
    string alias = 3;               // local name to reference it by
}

message MLXUnloadModelRequest {
    string request_id = 1;
    string alias = 2;
}

message MLXGenerateRequest {
    string request_id = 1;
    string alias = 2;               // which loaded model to use
    string prompt = 3;              // formatted prompt text
    float temperature = 4;
    int32 max_tokens = 5;
    repeated MLXChatMessage messages = 6;  // chat messages (alternative to raw prompt)
}

message MLXChatMessage {
    string role = 1;                // "system", "user", "assistant"
    string content = 2;
}

message MLXListModelsRequest {
    string request_id = 1;
}

message MLXResponse {
    string request_id = 1;
    oneof payload {
        MLXLoadModelResponse load_model = 2;
        MLXUnloadModelResponse unload_model = 3;
        MLXGenerateResponse generate = 4;
        MLXListModelsResponse list_models = 5;
        MLXErrorResponse error = 6;
    }
}

message MLXLoadModelResponse {
    string alias = 1;
    bool success = 2;
}

message MLXUnloadModelResponse {
    string alias = 1;
    bool success = 2;
}

message MLXGenerateResponse {
    string text = 1;                // generated text
    int32 prompt_tokens = 2;
    int32 completion_tokens = 3;
    bool is_final = 4;             // true for last chunk or non-streaming
}

message MLXListModelsResponse {
    message LoadedModel {
        string alias = 1;
        string huggingface_repo = 2;
    }
    repeated LoadedModel models = 1;
}

message MLXErrorResponse {
    string error_message = 1;
}
